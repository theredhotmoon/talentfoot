services:
  # ─── Laravel Backend ──────────────────────────────────────
  backend:
    build:
      context: ./treneiro-service
      target: production
    container_name: treneiro-backend
    ports:
      - "8000:8000"
    depends_on:
      db:
        condition: service_healthy
    volumes:
      # Persist uploaded media files
      - storage_data:/app/storage/app/public
    environment:
      - APP_NAME=${APP_NAME:-TalentFoot}
      - APP_ENV=${APP_ENV:-production}
      - APP_KEY=${APP_KEY:-}
      - APP_DEBUG=${APP_DEBUG:-false}
      - APP_URL=${APP_URL:-http://localhost:8000}
      - DB_CONNECTION=mysql
      - DB_HOST=db
      - DB_PORT=3306
      - DB_DATABASE=talentfoot
      - DB_USERNAME=root
      - DB_PASSWORD=${DB_PASSWORD:-secret}
      - FRONTEND_URL=${FRONTEND_URL:-http://localhost:3000}
      - LOG_CHANNEL=stack
      - LOG_LEVEL=${LOG_LEVEL:-warning}
      - CACHE_DRIVER=file
      - SESSION_DRIVER=file
      - QUEUE_CONNECTION=sync
      - RUN_MIGRATIONS=${RUN_MIGRATIONS:-true}
    networks:
      - app-network
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/api/test"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 30s

  # ─── MariaDB Database ─────────────────────────────────────
  db:
    image: mariadb:10.11-jammy
    container_name: treneiro-db
    restart: unless-stopped
    environment:
      MYSQL_DATABASE: talentfoot
      MYSQL_ROOT_PASSWORD: ${DB_PASSWORD:-secret}
    volumes:
      - mysql_data:/var/lib/mysql
    networks:
      - app-network
    healthcheck:
      test: ["CMD", "healthcheck.sh", "--connect", "--innodb_initialized"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ─── Vue Frontend ─────────────────────────────────────────
  frontend:
    build:
      context: ./treneiro-web-app
      target: production
    container_name: treneiro-frontend
    ports:
      - "3000:80"
    depends_on:
      backend:
        condition: service_healthy
    networks:
      - app-network
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:80/"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 5s

# ─── Networks ─────────────────────────────────────────────
networks:
  app-network:
    driver: bridge

# ─── Volumes ──────────────────────────────────────────────
volumes:
  storage_data:
    driver: local
  mysql_data:
    driver: local
