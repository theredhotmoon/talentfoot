name: CI / CD Pipeline

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:   # ← enables the "Run workflow" button in GitHub Actions UI

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  # ──────────────────────────────────────────────
  # JOB 1 — Backend tests (PHPUnit)
  # ──────────────────────────────────────────────
  test-backend:
    name: Backend Tests (PHPUnit)
    runs-on: ubuntu-latest

    services:
      mysql:
        image: mysql:8.0
        env:
          MYSQL_ROOT_PASSWORD: root
          MYSQL_DATABASE: laravel_test
        ports:
          - 3306:3306
        options: >-
          --health-cmd="mysqladmin ping"
          --health-interval=10s
          --health-timeout=5s
          --health-retries=5

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup PHP 8.1
        uses: shivammathur/setup-php@v2
        with:
          php-version: '8.1'
          extensions: mbstring, bcmath, pdo, pdo_mysql, xml, ctype, fileinfo, json, openssl, tokenizer
          coverage: none

      - name: Cache Composer dependencies
        uses: actions/cache@v4
        with:
          path: treneiro-service/vendor
          key: composer-${{ hashFiles('treneiro-service/composer.lock') }}
          restore-keys: composer-

      - name: Install Composer dependencies
        working-directory: treneiro-service
        run: composer install --no-interaction --prefer-dist --optimize-autoloader

      - name: Prepare Laravel environment
        working-directory: treneiro-service
        run: |
          cp .env.example .env
          php artisan key:generate
          sed -i 's/DB_DATABASE=laravel/DB_DATABASE=laravel_test/' .env
          sed -i 's/DB_USERNAME=root/DB_USERNAME=root/' .env
          sed -i 's/DB_PASSWORD=/DB_PASSWORD=root/' .env

      - name: Create storage directories
        working-directory: treneiro-service
        run: |
          mkdir -p storage/framework/sessions
          mkdir -p storage/framework/views
          mkdir -p storage/framework/cache/data
          mkdir -p storage/logs
          mkdir -p storage/app/public/clips
          mkdir -p storage/app/public/subclips
          mkdir -p storage/app/public/thumbnails
          mkdir -p storage/app/public/captions
          chmod -R 777 storage bootstrap/cache

      - name: Run database migrations
        working-directory: treneiro-service
        run: php artisan migrate --force

      - name: Run PHPUnit tests
        working-directory: treneiro-service
        run: php artisan test

  # ──────────────────────────────────────────────
  # JOB 2 — Frontend build + E2E tests (Playwright)
  # ──────────────────────────────────────────────
  test-frontend:
    name: Frontend Build & E2E Tests (Playwright)
    runs-on: ubuntu-latest

    services:
      mysql:
        image: mysql:8.0
        env:
          MYSQL_ROOT_PASSWORD: root
          MYSQL_DATABASE: laravel_test
        ports:
          - 3306:3306
        options: >-
          --health-cmd="mysqladmin ping"
          --health-interval=10s
          --health-timeout=5s
          --health-retries=5

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      # — Backend setup (needed by Playwright) —
      - name: Setup PHP 8.1
        uses: shivammathur/setup-php@v2
        with:
          php-version: '8.1'
          extensions: mbstring, bcmath, pdo, pdo_mysql, xml, ctype, fileinfo, json, openssl, tokenizer
          coverage: none

      - name: Cache Composer dependencies
        uses: actions/cache@v4
        with:
          path: treneiro-service/vendor
          key: composer-${{ hashFiles('treneiro-service/composer.lock') }}
          restore-keys: composer-

      - name: Install backend dependencies
        working-directory: treneiro-service
        run: composer install --no-interaction --prefer-dist --optimize-autoloader

      - name: Prepare Laravel environment
        working-directory: treneiro-service
        run: |
          cp .env.example .env
          php artisan key:generate
          sed -i 's/DB_DATABASE=laravel/DB_DATABASE=laravel_test/' .env
          sed -i 's/DB_USERNAME=root/DB_USERNAME=root/' .env
          sed -i 's/DB_PASSWORD=/DB_PASSWORD=root/' .env

      - name: Create storage directories
        working-directory: treneiro-service
        run: |
          mkdir -p storage/framework/sessions
          mkdir -p storage/framework/views
          mkdir -p storage/framework/cache/data
          mkdir -p storage/logs
          mkdir -p storage/app/public/clips
          mkdir -p storage/app/public/subclips
          mkdir -p storage/app/public/thumbnails
          mkdir -p storage/app/public/captions
          chmod -R 777 storage bootstrap/cache

      - name: Run migrations and seed test data
        working-directory: treneiro-service
        run: |
          php artisan migrate --force
          php artisan db:seed --force

      - name: Verify seeded users exist in DB
        run: |
          mysql -h 127.0.0.1 -u root -proot laravel_test -e "SELECT id, name, email, role, LEFT(password,20) AS pw_prefix FROM users;"

      - name: Start Laravel backend (port 8000)
        working-directory: treneiro-service
        run: php artisan serve --port=8000 &

      # — Frontend setup —
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: treneiro-web-app/package-lock.json

      - name: Install frontend dependencies
        working-directory: treneiro-web-app
        run: npm ci

      - name: Start Vite dev server (port 5173)
        working-directory: treneiro-web-app
        env:
          VITE_API_BASE_URL: http://localhost:8000
        run: npm run dev &

      - name: Wait for both servers to be ready
        run: |
          echo "Waiting for Laravel on port 8000..."
          timeout 60 bash -c 'until curl -s -o /dev/null http://localhost:8000/api/health/dependencies; do sleep 1; done'
          echo "Laravel is up."
          echo "Waiting for Vite on port 5173..."
          timeout 60 bash -c 'until curl -s -o /dev/null http://localhost:5173; do sleep 1; done'
          echo "Vite is up."

      - name: Install Playwright browsers
        working-directory: treneiro-web-app
        run: npx playwright install --with-deps chromium

      - name: Run E2E tests
        working-directory: treneiro-web-app
        env:
          CI: true
          VITE_API_BASE_URL: http://localhost:8000
        run: npm run test:e2e

      - name: Upload Playwright report
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: playwright-report
          path: treneiro-web-app/playwright-report/
          retention-days: 14

  # ──────────────────────────────────────────────
  # JOB 3 — Build frontend artifact
  # ──────────────────────────────────────────────
  build-frontend:
    name: Build Frontend
    runs-on: ubuntu-latest
    needs: [test-backend, test-frontend]
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: treneiro-web-app/package-lock.json

      - name: Install dependencies
        working-directory: treneiro-web-app
        run: npm ci

      - name: Build Vue app
        working-directory: treneiro-web-app
        env:
          VITE_API_BASE_URL: ${{ secrets.VPS_API_URL }}
        run: npm run build

      - name: Upload frontend build artifact
        uses: actions/upload-artifact@v4
        with:
          name: frontend-dist
          path: treneiro-web-app/dist/
          retention-days: 1

  # ──────────────────────────────────────────────
  # JOB 4 — Deploy to Hostinger VPS
  # ──────────────────────────────────────────────
  deploy:
    name: Deploy to Hostinger VPS
    runs-on: ubuntu-latest
    needs: [build-frontend]
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Download frontend build
        uses: actions/download-artifact@v4
        with:
          name: frontend-dist
          path: dist/

      - name: Setup SSH key
        run: |
          mkdir -p ~/.ssh
          echo "${{ secrets.VPS_SSH_KEY }}" | base64 -d > ~/.ssh/id_ed25519
          chmod 600 ~/.ssh/id_ed25519
          ssh-keyscan -H ${{ secrets.VPS_HOST }} >> ~/.ssh/known_hosts

      - name: Debug — Validate SSH key (safe, no secret exposed)
        run: |
          echo "==> Key file size: $(wc -c < ~/.ssh/id_ed25519) bytes"
          echo "==> Key header line: $(head -1 ~/.ssh/id_ed25519)"
          echo "==> Key footer line: $(tail -1 ~/.ssh/id_ed25519)"
          ssh-keygen -l -f ~/.ssh/id_ed25519 && echo "==> Key is VALID" || echo "==> Key is INVALID"

      # — Deploy Frontend (built static files → nginx/apache public dir) —
      - name: Deploy frontend to VPS
        run: |
          rsync -avz --delete \
            -e "ssh -i ~/.ssh/id_ed25519 -o StrictHostKeyChecking=no" \
            dist/ \
            ${{ secrets.VPS_USER }}@${{ secrets.VPS_HOST }}:${{ secrets.VPS_FRONTEND_PATH }}/

      # — Deploy Backend (Docker Compose on VPS) —
      - name: Deploy backend to VPS
        run: |
          ssh -i ~/.ssh/id_ed25519 \
            -o StrictHostKeyChecking=no \
            ${{ secrets.VPS_USER }}@${{ secrets.VPS_HOST }} << 'ENDSSH'
            set -e

            BACKEND_PATH="${{ secrets.VPS_BACKEND_PATH }}"
            REPO_URL="https://github.com/theredhotmoon/talentfoot.git"
            COMPOSE_DIR="/docker/talentfoot"

            echo "==> Checking backend directory..."
            if [ -d "$BACKEND_PATH/.git" ]; then
              echo "==> Git repo found. Pulling latest code..."
              cd "$BACKEND_PATH"
              git pull origin main
            else
              echo "==> Directory exists but is not a git repo. Initialising..."
              mkdir -p "$BACKEND_PATH"
              cd "$BACKEND_PATH"
              git init
              git remote add origin "$REPO_URL"
              git fetch origin main
              git checkout -f -B main origin/main
            fi

            echo "==> Rebuilding and restarting Docker containers..."
            cd "$COMPOSE_DIR"
            docker compose pull db 2>/dev/null || true
            docker compose build --no-cache backend
            docker compose up -d --force-recreate backend

            echo "==> Waiting for backend container to be healthy..."
            for i in $(seq 1 30); do
              STATUS=$(docker inspect --format='{{.State.Health.Status}}' treneiro-backend 2>/dev/null || echo "starting")
              echo "  Health: $STATUS (attempt $i/30)"
              if [ "$STATUS" = "healthy" ]; then break; fi
              sleep 5
            done

            echo "==> Running database migrations inside container..."
            docker compose exec -T backend php artisan migrate --force

            echo "==> Clearing caches inside container..."
            docker compose exec -T backend php artisan config:cache
            docker compose exec -T backend php artisan route:cache
            docker compose exec -T backend php artisan view:cache

            echo "==> Deployment complete!"
          ENDSSH
