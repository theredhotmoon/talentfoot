name: CI / CD Pipeline

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:   # ← enables the "Run workflow" button in GitHub Actions UI

jobs:
  # ──────────────────────────────────────────────
  # JOB 1 — Backend tests (PHPUnit)
  # ──────────────────────────────────────────────
  test-backend:
    name: Backend Tests (PHPUnit)
    runs-on: ubuntu-latest

    services:
      mysql:
        image: mysql:8.0
        env:
          MYSQL_ROOT_PASSWORD: root
          MYSQL_DATABASE: laravel_test
        ports:
          - 3306:3306
        options: >-
          --health-cmd="mysqladmin ping"
          --health-interval=10s
          --health-timeout=5s
          --health-retries=5

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup PHP 8.1
        uses: shivammathur/setup-php@v2
        with:
          php-version: '8.1'
          extensions: mbstring, bcmath, pdo, pdo_mysql, xml, ctype, fileinfo, json, openssl, tokenizer
          coverage: none

      - name: Cache Composer dependencies
        uses: actions/cache@v4
        with:
          path: talentfoot/treneiro-service/vendor
          key: composer-${{ hashFiles('talentfoot/treneiro-service/composer.lock') }}
          restore-keys: composer-

      - name: Install Composer dependencies
        working-directory: talentfoot/treneiro-service
        run: composer install --no-interaction --prefer-dist --optimize-autoloader

      - name: Prepare Laravel environment
        working-directory: talentfoot/treneiro-service
        run: |
          cp .env.example .env
          php artisan key:generate
          sed -i 's/DB_DATABASE=laravel/DB_DATABASE=laravel_test/' .env
          sed -i 's/DB_USERNAME=root/DB_USERNAME=root/' .env
          sed -i 's/DB_PASSWORD=/DB_PASSWORD=root/' .env

      - name: Run database migrations
        working-directory: talentfoot/treneiro-service
        run: php artisan migrate --force

      - name: Run PHPUnit tests
        working-directory: talentfoot/treneiro-service
        run: php artisan test --parallel

  # ──────────────────────────────────────────────
  # JOB 2 — Frontend build + E2E tests (Playwright)
  # ──────────────────────────────────────────────
  test-frontend:
    name: Frontend Build & E2E Tests (Playwright)
    runs-on: ubuntu-latest

    services:
      mysql:
        image: mysql:8.0
        env:
          MYSQL_ROOT_PASSWORD: root
          MYSQL_DATABASE: laravel_test
        ports:
          - 3306:3306
        options: >-
          --health-cmd="mysqladmin ping"
          --health-interval=10s
          --health-timeout=5s
          --health-retries=5

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      # — Backend setup (needed by Playwright) —
      - name: Setup PHP 8.1
        uses: shivammathur/setup-php@v2
        with:
          php-version: '8.1'
          extensions: mbstring, bcmath, pdo, pdo_mysql, xml, ctype, fileinfo, json, openssl, tokenizer
          coverage: none

      - name: Cache Composer dependencies
        uses: actions/cache@v4
        with:
          path: talentfoot/treneiro-service/vendor
          key: composer-${{ hashFiles('talentfoot/treneiro-service/composer.lock') }}
          restore-keys: composer-

      - name: Install backend dependencies
        working-directory: talentfoot/treneiro-service
        run: composer install --no-interaction --prefer-dist --optimize-autoloader

      - name: Prepare Laravel environment
        working-directory: talentfoot/treneiro-service
        run: |
          cp .env.example .env
          php artisan key:generate
          sed -i 's/DB_DATABASE=laravel/DB_DATABASE=laravel_test/' .env
          sed -i 's/DB_USERNAME=root/DB_USERNAME=root/' .env
          sed -i 's/DB_PASSWORD=/DB_PASSWORD=root/' .env

      - name: Run migrations and seed test data
        working-directory: talentfoot/treneiro-service
        run: |
          php artisan migrate --force
          php artisan db:seed --force

      - name: Start Laravel backend (port 8000)
        working-directory: talentfoot/treneiro-service
        run: php artisan serve --port=8000 &

      # — Frontend setup —
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: talentfoot/treneiro-web-app/package-lock.json

      - name: Install frontend dependencies
        working-directory: talentfoot/treneiro-web-app
        run: npm ci

      - name: Install Playwright browsers
        working-directory: talentfoot/treneiro-web-app
        run: npx playwright install --with-deps chromium

      - name: Run E2E tests
        working-directory: talentfoot/treneiro-web-app
        env:
          CI: true
          VITE_API_BASE_URL: http://localhost:8000
        run: npm run test:e2e

      - name: Upload Playwright report
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: playwright-report
          path: talentfoot/treneiro-web-app/playwright-report/
          retention-days: 14

  # ──────────────────────────────────────────────
  # JOB 3 — Build frontend artifact
  # ──────────────────────────────────────────────
  build-frontend:
    name: Build Frontend
    runs-on: ubuntu-latest
    needs: [test-backend, test-frontend]
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: talentfoot/treneiro-web-app/package-lock.json

      - name: Install dependencies
        working-directory: talentfoot/treneiro-web-app
        run: npm ci

      - name: Build Vue app
        working-directory: talentfoot/treneiro-web-app
        env:
          VITE_API_BASE_URL: ${{ secrets.VPS_API_URL }}
        run: npm run build

      - name: Upload frontend build artifact
        uses: actions/upload-artifact@v4
        with:
          name: frontend-dist
          path: talentfoot/treneiro-web-app/dist/
          retention-days: 1

  # ──────────────────────────────────────────────
  # JOB 4 — Deploy to Hostinger VPS
  # ──────────────────────────────────────────────
  deploy:
    name: Deploy to Hostinger VPS
    runs-on: ubuntu-latest
    needs: [build-frontend]
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Download frontend build
        uses: actions/download-artifact@v4
        with:
          name: frontend-dist
          path: dist/

      - name: Setup SSH key
        run: |
          mkdir -p ~/.ssh
          echo "${{ secrets.VPS_SSH_KEY }}" > ~/.ssh/id_rsa
          chmod 600 ~/.ssh/id_rsa
          ssh-keyscan -H ${{ secrets.VPS_HOST }} >> ~/.ssh/known_hosts

      # — Deploy Frontend (built static files → nginx/apache public dir) —
      - name: Deploy frontend to VPS
        run: |
          rsync -avz --delete \
            -e "ssh -i ~/.ssh/id_rsa -o StrictHostKeyChecking=no" \
            dist/ \
            ${{ secrets.VPS_USER }}@${{ secrets.VPS_HOST }}:${{ secrets.VPS_FRONTEND_PATH }}/

      # — Deploy Backend (pull code, install deps, migrate) —
      - name: Deploy backend to VPS
        run: |
          ssh -i ~/.ssh/id_rsa \
            -o StrictHostKeyChecking=no \
            ${{ secrets.VPS_USER }}@${{ secrets.VPS_HOST }} << 'ENDSSH'
            set -e

            echo "==> Navigating to backend directory..."
            cd ${{ secrets.VPS_BACKEND_PATH }}

            echo "==> Pulling latest code..."
            git pull origin main

            echo "==> Installing Composer dependencies..."
            composer install --no-interaction --prefer-dist --optimize-autoloader --no-dev

            echo "==> Running database migrations..."
            php artisan migrate --force

            echo "==> Clearing caches..."
            php artisan config:cache
            php artisan route:cache
            php artisan view:cache

            echo "==> Setting permissions..."
            chmod -R 775 storage bootstrap/cache
            chown -R www-data:www-data storage bootstrap/cache

            echo "==> Restarting queue workers (if any)..."
            php artisan queue:restart || true

            echo "==> Deployment complete!"
          ENDSSH
