<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 200" width="200" height="200">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#1a1a2e"/>
      <stop offset="100%" style="stop-color:#0f0e17"/>
    </linearGradient>
    <linearGradient id="ball" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#6ee7b7"/>
      <stop offset="50%" style="stop-color:#34d399"/>
      <stop offset="100%" style="stop-color:#10b981"/>
    </linearGradient>
    <filter id="glow">
      <feDropShadow dx="0" dy="0" stdDeviation="6" flood-color="#10b981" flood-opacity="0.5"/>
    </filter>
  </defs>

  <!-- Background -->
  <rect width="200" height="200" rx="32" fill="url(#bg)"/>

  <!-- Ball -->
  <g filter="url(#glow)" transform="translate(100, 85)">
    <circle cx="0" cy="0" r="50" fill="url(#ball)" opacity="0.95"/>
    <g fill="none" stroke="rgba(255,255,255,0.35)" stroke-width="1.5">
      <polygon points="0,-16 -15,-5 -9,13 9,13 15,-5"/>
      <line x1="0" y1="-16" x2="0" y2="-36"/>
      <line x1="-15" y1="-5" x2="-34" y2="-20"/>
      <line x1="15" y1="-5" x2="34" y2="-20"/>
      <line x1="-9" y1="13" x2="-27" y2="32"/>
      <line x1="9" y1="13" x2="27" y2="32"/>
      <line x1="0" y1="-36" x2="-34" y2="-20"/>
      <line x1="0" y1="-36" x2="34" y2="-20"/>
      <line x1="-34" y1="-20" x2="-44" y2="9"/>
      <line x1="34" y1="-20" x2="44" y2="9"/>
      <line x1="-44" y1="9" x2="-27" y2="32"/>
      <line x1="44" y1="9" x2="27" y2="32"/>
      <line x1="-27" y1="32" x2="0" y2="45"/>
      <line x1="27" y1="32" x2="0" y2="45"/>
    </g>
    <circle cx="-14" cy="-18" r="16" fill="rgba(255,255,255,0.15)"/>
  </g>

  <!-- TF initials -->
  <text x="100" y="175" text-anchor="middle" font-family="'Segoe UI', 'Helvetica Neue', Arial, sans-serif" font-weight="800" font-size="22" fill="rgba(255,255,255,0.7)" letter-spacing="6">
    TALENTFOOT
  </text>
</svg>
