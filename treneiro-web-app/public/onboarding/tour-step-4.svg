<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 200" width="400" height="200">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#1e1e2f"/>
      <stop offset="100%" style="stop-color:#0f0e17"/>
    </linearGradient>
    <linearGradient id="progressGrad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#2dd4bf"/>
      <stop offset="100%" style="stop-color:#10b981"/>
    </linearGradient>
    <filter id="glow">
      <feDropShadow dx="0" dy="2" stdDeviation="4" flood-color="#fbbf24" flood-opacity="0.4"/>
    </filter>
  </defs>

  <rect width="400" height="200" fill="url(#bg)"/>

  <!-- Challenge Tile -->
  <rect x="40" y="50" width="320" height="100" rx="12" fill="#1e1e2f" stroke="rgba(255,255,255,0.1)"/>
  <rect x="60" y="70" width="140" height="8" rx="4" fill="#ffffff" opacity="0.8"/>
  <rect x="60" y="86" width="220" height="6" rx="3" fill="#ffffff" opacity="0.3"/>
  
  <!-- Progress Bar Area -->
  <g transform="translate(60, 115)">
    <!-- Trophy Icon -->
    <text x="0" y="14" font-family="Arial" font-size="16" filter="url(#glow)">🏆</text>
    
    <!-- Background Track -->
    <rect x="25" y="8" width="215" height="6" rx="3" fill="rgba(255,255,255,0.1)"/>
    
    <!-- Filled Progress -->
    <rect x="25" y="8" width="215" height="6" rx="3" fill="url(#progressGrad)"/>
    
    <!-- Sparkles -->
    <circle cx="210" cy="5" r="2" fill="#ffffff" opacity="0.8"/>
    <circle cx="230" cy="18" r="1.5" fill="#fde047" opacity="0.9"/>
    <circle cx="245" cy="2" r="2.5" fill="#ffffff" opacity="0.7"/>

    <!-- Counter -->
    <rect x="250" y="6" width="30" height="10" rx="2" fill="rgba(255,255,255,0.1)"/>
    <rect x="254" y="9" width="22" height="4" rx="2" fill="#ffffff" opacity="0.6"/>
  </g>
</svg>
