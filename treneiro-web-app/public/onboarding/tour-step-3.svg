<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 200" width="400" height="200">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#1e1e2f"/>
      <stop offset="100%" style="stop-color:#0f0e17"/>
    </linearGradient>
    <filter id="glow">
      <feDropShadow dx="0" dy="2" stdDeviation="4" flood-color="#a78bfa" flood-opacity="0.4"/>
    </filter>
  </defs>

  <rect width="400" height="200" fill="url(#bg)"/>

  <!-- Subscription Active Badge -->
  <rect x="280" y="20" width="100" height="24" rx="12" fill="rgba(167,139,250,0.15)"/>
  <circle cx="295" cy="32" r="4" fill="#a78bfa"/>
  <rect x="305" y="30" width="60" height="4" rx="2" fill="#a78bfa"/>

  <!-- Start Challenge Tile Header -->
  <rect x="40" y="60" width="320" height="100" rx="12" fill="#1e1e2f" stroke="rgba(255,255,255,0.1)"/>
  <rect x="60" y="80" width="120" height="8" rx="4" fill="#ffffff" opacity="0.8"/>
  <rect x="60" y="96" width="200" height="6" rx="3" fill="#ffffff" opacity="0.4"/>
  
  <!-- "Start Challenge" Button Highlight -->
  <g transform="translate(60, 115)">
    <rect x="0" y="0" width="280" height="32" rx="8" fill="rgba(251,191,36,0.15)" stroke="rgba(251,191,36,0.5)" filter="url(#glow)"/>
    <circle cx="100" cy="16" r="6" fill="#fbbf24"/> <!-- Lightning bolt placeholder -->
    <rect x="115" y="14" width="80" height="4" rx="2" fill="#fbbf24"/>
    
    <!-- Mouse Cursor -->
    <g transform="translate(150, 20)">
      <polygon points="0,0 15,10 7,12 10,20 6,22 3,14 -4,16" fill="#ffffff" stroke="#000000" stroke-width="1"/>
    </g>
  </g>
</svg>
