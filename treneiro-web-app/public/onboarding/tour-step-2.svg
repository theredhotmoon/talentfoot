<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 200" width="400" height="200">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#1e1e2f"/>
      <stop offset="100%" style="stop-color:#0f0e17"/>
    </linearGradient>
    <filter id="glow">
      <feDropShadow dx="0" dy="2" stdDeviation="4" flood-color="#22d3ee" flood-opacity="0.3"/>
    </filter>
  </defs>

  <!-- Background -->
  <rect width="400" height="200" fill="url(#bg)"/>

  <!-- Simplified Video Player Layout -->
  
  <!-- Main Video Area -->
  <rect x="20" y="20" width="240" height="135" rx="8" fill="#000" stroke="rgba(255,255,255,0.1)"/>
  <circle cx="140" cy="87" r="15" fill="#22d3ee" opacity="0.8"/>
  <polygon points="135,80 148,87 135,94" fill="#0f0e17"/>
  <rect x="30" y="140" width="220" height="3" rx="1.5" fill="rgba(255,255,255,0.3)"/>
  <rect x="30" y="140" width="60" height="3" rx="1.5" fill="#22d3ee"/>

  <!-- Subclips Sidebar -->
  <g transform="translate(280, 20)">
    <!-- Main Clip (Free) -->
    <rect x="0" y="0" width="100" height="40" rx="6" fill="#1e1e2f" stroke="rgba(255,255,255,0.1)"/>
    <rect x="0" y="0" width="40" height="40" rx="6" fill="#2d2d3f"/>
    <rect x="50" y="10" width="40" height="4" rx="2" fill="#ffffff" opacity="0.7"/>
    <rect x="50" y="20" width="20" height="3" rx="1.5" fill="#ffffff" opacity="0.3"/>

    <!-- Preview Subclip (Free) -->
    <rect x="0" y="50" width="100" height="40" rx="6" fill="#1e1e2f" stroke="#22d3ee" filter="url(#glow)"/>
    <rect x="0" y="50" width="40" height="40" rx="6" fill="#2d2d3f"/>
    <circle cx="20" cy="70" r="8" fill="#22d3ee"/>
    <polygon points="18,66 24,70 18,74" fill="#0f0e17"/>
    <rect x="50" y="60" width="35" height="4" rx="2" fill="#ffffff" opacity="0.7"/>
    <rect x="50" y="70" width="25" height="3" rx="1.5" fill="#ffffff" opacity="0.4"/>
    <circle cx="90" cy="62" r="4" fill="#22d3ee"/> <!-- Eye icon placeholder -->

    <!-- Locked Subclip -->
    <rect x="0" y="100" width="100" height="40" rx="6" fill="#151522" stroke="rgba(255,255,255,0.05)"/>
    <rect x="0" y="100" width="40" height="40" rx="6" fill="#20202a" opacity="0.5"/>
    <rect x="50" y="110" width="40" height="4" rx="2" fill="#ffffff" opacity="0.3"/>
    <circle cx="90" cy="112" r="4" fill="#6b7280"/> <!-- Lock icon placeholder -->
  </g>
</svg>
