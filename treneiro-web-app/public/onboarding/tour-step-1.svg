<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 200" width="400" height="200">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#1e1e2f"/>
      <stop offset="100%" style="stop-color:#0f0e17"/>
    </linearGradient>
    <filter id="glow">
      <feDropShadow dx="0" dy="2" stdDeviation="4" flood-color="#10b981" flood-opacity="0.3"/>
    </filter>
  </defs>

  <!-- Background -->
  <rect width="400" height="200" fill="url(#bg)"/>

  <!-- Simplified Dashboard Layout -->
  <!-- Header -->
  <rect x="20" y="20" width="100" height="12" rx="6" fill="#10b981" opacity="0.8"/>
  <rect x="20" y="40" width="60" height="8" rx="4" fill="#a78bfa" opacity="0.5"/>

  <!-- Cards -->
  <g transform="translate(20, 70)">
    <!-- Card 1 (Highlighted) -->
    <rect x="0" y="0" width="110" height="100" rx="8" fill="#1e1e2f" stroke="#10b981" stroke-width="2" filter="url(#glow)"/>
    <rect x="0" y="0" width="110" height="60" rx="8" fill="#2d2d3f"/> <!-- Thumbnail -->
    <circle cx="55" cy="30" r="12" fill="#10b981"/> <!-- Play button -->
    <polygon points="52,25 60,30 52,35" fill="#0f0e17"/>
    <rect x="10" y="70" width="90" height="6" rx="3" fill="#ffffff" opacity="0.7"/>
    <rect x="10" y="82" width="60" height="4" rx="2" fill="#ffffff" opacity="0.4"/>

    <!-- Mouse Cursor -->
    <g transform="translate(85, 85)">
      <polygon points="0,0 15,10 7,12 10,20 6,22 3,14 -4,16" fill="#ffffff" stroke="#000000" stroke-width="1"/>
    </g>
  </g>

  <!-- Card 2 -->
  <g transform="translate(145, 70)" opacity="0.5">
    <rect x="0" y="0" width="110" height="100" rx="8" fill="#1e1e2f" stroke="rgba(255,255,255,0.1)"/>
    <rect x="0" y="0" width="110" height="60" rx="8" fill="#2d2d3f"/>
    <rect x="10" y="70" width="80" height="6" rx="3" fill="#ffffff" opacity="0.7"/>
    <rect x="10" y="82" width="50" height="4" rx="2" fill="#ffffff" opacity="0.4"/>
  </g>

  <!-- Card 3 -->
  <g transform="translate(270, 70)" opacity="0.5">
    <rect x="0" y="0" width="110" height="100" rx="8" fill="#1e1e2f" stroke="rgba(255,255,255,0.1)"/>
    <rect x="0" y="0" width="110" height="60" rx="8" fill="#2d2d3f"/>
    <rect x="10" y="70" width="90" height="6" rx="3" fill="#ffffff" opacity="0.7"/>
    <rect x="10" y="82" width="70" height="4" rx="2" fill="#ffffff" opacity="0.4"/>
  </g>
</svg>
